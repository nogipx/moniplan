name: moniplan_app
description: A new Flutter project.
publish_to: 'none'
version: 1.16.0+40

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Modules
  moniplan_domain:
    path: ../moniplan_domain
  moniplan_uikit:
    path: ../moniplan_uikit

  # Features
  feature_flutter: ^2.0.0

  # UI
  responsive_framework: ^1.5.1
  draggable_scrollbar: 0.1.0
  permission_handler: ^11.4.0
  share_plus: ^10.1.4
  file_picker: ^9.0.2
  dynamic_color: 1.7.0
  receive_sharing_intent:
    git: https://github.com/nogipx/receive_sharing_intent
  oktoast: 3.4.0
  fl_chart: ^0.70.0
  tflite_flutter: 
    git:
      url: https://github.com/nogipx/flutter-tflite
      ref: fcd9746ddc273f0eb3bcf4ac269e7ea3bf352839

  # Sliver
  sliver_tools: 0.2.12
  super_sliver_list: 0.4.1
  sticky_headers: 0.3.0+2

  # Data management
  flutter_bloc: ^9.0.0

  # Data
  logging: any
  get_it: 8.0.3
  intl: ^0.19.0
  package_info_plus: ^8.3.0
  device_info_plus: ^11.3.2
  encrypt: 5.0.3
  crypto: ^3.0.3
  equatable: ^2.0.7
  expressions: ^0.2.5+2
  stack_trace: ^1.12.1
  flutter_secure_storage: ^9.2.4
  envied: ^1.1.1

  # Persistent
  shared_preferences: ^2.3.3
  drift_db_viewer: 2.1.0
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.1

  # Persistence
  drift: ^2.22.1

  # State
  bloc: ^9.0.0
  bloc_concurrency: ^0.3.0


dev_dependencies:
  flutter_lints: ^5.0.0

  # Test
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter

  # Codegen
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.0
  drift_dev: ^2.22.1
  envied_generator: ^1.1.1

  # Tools
  packo: 0.5.1

dependency_overrides:
  pointycastle: ^3.6.2
  
flutter:
  uses-material-design: true
  fonts:
    - family: TTNeoris
      fonts:
        - asset: fonts/TT-Neoris-Variable.ttf
  assets:
    - 'assets/'
    - 'assets/tflite/'

flutter_intl:
  enabled: true
  arb_dir: lib/i18n/arb
  output_dir: lib/i18n/generated
  use_deferred_loading: false
