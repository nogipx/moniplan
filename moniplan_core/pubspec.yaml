name: moniplan_core
description: A starting point for Dart libraries or applications.
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  moniplan_domain:
    path: ../moniplan_domain

  # Persistence
  drift: ^2.22.1

  # State
  bloc: ^9.0.0
  bloc_concurrency: ^0.3.0

  # Codegen
  encrypt: 5.0.3

dev_dependencies:
  # Code Quality
  bloc_test: ^10.0.0
  lints: ^5.0.0
  test: any

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.8
  json_serializable: ^6.9.0
  drift_dev: ^2.22.1